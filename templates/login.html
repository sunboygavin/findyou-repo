<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Findyou · 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f5f5f7;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#86868b;
  --blue:#0071e3;--blue-hover:#0077ed;--red:#ff3b30;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);
  --radius:12px;
  --shadow-lg:0 8px 30px rgba(0,0,0,0.12);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Noto Sans SC","PingFang SC","Helvetica Neue",sans-serif;
  --mono:"SF Mono","SFMono-Regular",Menlo,monospace;
}
body{font-family:var(--font);background:var(--bg2);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.login-wrap{width:100%;max-width:420px;padding:0 24px}
.logo{text-align:center;margin-bottom:40px}
.logo-mark{width:56px;height:56px;background:var(--text);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800;margin:0 auto 16px}
.logo h1{font-size:28px;font-weight:700;letter-spacing:-0.02em}
.logo p{font-size:15px;color:var(--text2);margin-top:6px}
.card{background:var(--bg);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow-lg)}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;font-family:var(--font);outline:none;transition:border .2s,box-shadow .2s;background:var(--bg)}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,113,227,0.1)}
.field input::placeholder{color:var(--text3)}
.error{background:#fff0f0;color:var(--red);font-size:13px;padding:10px 14px;border-radius:var(--radius);margin-bottom:16px}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:980px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .2s}
.btn:hover{background:var(--blue-hover)}
.divider{display:flex;align-items:center;margin:22px 0;gap:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.demo-hint{text-align:center;font-size:13px;color:var(--text3);padding:12px;background:var(--bg2);border-radius:var(--radius)}
.demo-hint code{background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-size:12px;font-family:var(--mono)}
.footer{text-align:center;margin-top:28px;font-size:13px;color:var(--text3)}
.footer a{color:var(--text2);text-decoration:underline}
</style>
</head>
<body>
<div class="login-wrap">
<div class="logo">
<div class="logo-mark">F</div>
<h1>Findyou</h1>
<p>企业级 AI 数字员工平台</p>
</div>
<div class="card">
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST" action="/login">
<div class="field">
<label>用户名</label>
<input type="text" name="username" placeholder="输入用户名" autofocus required>
</div>
<div class="field">
<label>密码</label>
<input type="password" name="password" placeholder="输入密码" required>
</div>
<button type="submit" class="btn">登录</button>
</form>
</div>
<div class="footer">© 2026 Findyou · <a href="mailto:sunboygavin@126.com">联系我们</a></div>
</div>
</body>
</html>
